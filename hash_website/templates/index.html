<!DOCTYPE html>
<html>
<head>
    <title>Hash Generator</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding-top: 50px;
        }

        h2 {
            color: #38bdf8;
        }

        input, button {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            background-color: #38bdf8;
            color: black;
            cursor: pointer;
        }

        button:hover {
            background-color: #0ea5e9;
        }

        .result {
            margin-top: 20px;
            color: #22c55e;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<h2>🔐 File Hash Generator</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required><br>
    <button type="submit">Generate Hash</button>
</form>

{% if hashes %}
<div class="result">
    <h3>MD5:</h3>
    <p>{{ hashes.md5 }}</p>

    <h3>SHA1:</h3>
    <p>{{ hashes.sha1 }}</p>

    <h3>SHA256:</h3>
    <p>{{ hashes.sha256 }}</p>
</div>
{% endif %}

</body>
</html>
