<!DOCTYPE html>
<html>
<head>
    <title>Bank Freeze Tool</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }

        .card {
            border-radius: 15px;
            padding: 30px;
            width: 400px;
            background: #ffffff10;
            backdrop-filter: blur(10px);
            box-shadow: 0px 4px 20px rgba(0,0,0,0.3);
            color: white;
        }

        .btn-custom {
            background: #00c6ff;
            border: none;
            width: 100%;
        }

        .btn-custom:hover {
            background: #0072ff;
        }

        input {
            background: white !important;
        }
    </style>
</head>

<body>

<div class="card text-center">

    <h2 class="mb-4">🏦 Bank Freeze Tool</h2>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" class="form-control mb-3" required>
        <button type="submit" class="btn btn-custom">Analyze Transactions</button>
    </form>

    {% if result %}
        <div class="mt-4 text-start">
            <h5>🚨 Suspicious Transactions</h5>
            <div style="max-height:200px; overflow:auto;">
                {{ result|safe }}
            </div>

            <a href="/download_freeze_pdf">
                <button class="btn btn-success mt-3 w-100">
                    📄 Download Freeze Application
                </button>
            </a>
        </div>
    {% endif %}

</div>

</body>
</html>
